name: Build and Deploy

# Reusable workflow: builds the app for one environment and publishes it to that
# environment's subfolder of the gh-pages branch (production | staging |
# development). Called by deploy.yml. Not triggered directly.
on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment + Pages subfolder (production | staging | development)
        required: true
        type: string
      project:
        description: Project name; used as the release tag prefix (e.g. desktop -> desktop-v1.0.0)
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to the triggering ref)
        required: false
        type: string
        default: ''
      create_tag:
        description: Create an immutable <project>-v<version> git tag (production releases only)
        required: false
        type: boolean
        default: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    # Binds AWS_KEY / S3_BUCKET (environment variables) and AWS_SECRET
    # (environment secret) to this job from the selected GitHub Environment.
    environment: ${{ inputs.environment }}

    # Only the permission needed to push to gh-pages and create the release tag.
    permissions:
      contents: write

    # Never let two deploys to the SAME environment run at once (avoids clobbering).
    concurrency:
      group: pages-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # full history so we can read/create tags

      - name: Read version from version.txt
        id: version
        run: echo "value=$(tr -d '[:space:]' < version.txt)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `tsc` first, so a type error fails the deploy here.
      - name: Type-check and build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/${{ inputs.environment }}/
          VITE_APP_ENV: ${{ inputs.environment }}
          VITE_AWS_KEY: ${{ vars.AWS_KEY }}
          VITE_AWS_SECRET: ${{ secrets.AWS_SECRET }}
          VITE_S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: npm run build

      # Production only: tag the released commit as <project>-v<version>. Fails
      # loudly if the tag already exists, which guarantees version.txt was bumped
      # for this release. The project prefix keeps tags distinct per project in a
      # monorepo (e.g. desktop-v1.0.0, mobile-v2.3.1).
      - name: Create release tag
        if: ${{ inputs.create_tag }}
        env:
          TAG: ${{ inputs.project }}-v${{ steps.version.outputs.value }}
        run: |
          git fetch --tags --quiet
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump version.txt before deploying to production."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # Emit a shields.io "endpoint" JSON so the README badges can show the
      # version currently deployed to this environment. Published alongside the
      # build at /<environment>/version.json.
      - name: Write version badge endpoint
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          case "$ENVIRONMENT" in
            production) COLOR=brightgreen ;;
            staging)    COLOR=orange ;;
            *)          COLOR=blue ;;
          esac
          printf '{"schemaVersion":1,"label":"%s","message":"v%s","color":"%s","cacheSeconds":300}\n' \
            "$ENVIRONMENT" "$VERSION" "$COLOR" > dist/version.json

      # keep_files: true means we only touch this environment's folder and leave
      # the other environments' folders on gh-pages untouched.
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ inputs.environment }}
          keep_files: true
          commit_message: "deploy ${{ inputs.environment }} (v${{ steps.version.outputs.value }})"

      - name: Job summary
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT: ${{ inputs.project }}
          VERSION: ${{ steps.version.outputs.value }}
          TAGGED: ${{ inputs.create_tag }}
        run: |
          URL="https://${OWNER,,}.github.io/${REPO}/${ENVIRONMENT}/"
          {
            echo "### Deployed 🚀"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Project | \`${PROJECT}\` |"
            echo "| Environment | \`${ENVIRONMENT}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| URL | ${URL} |"
            if [ "$TAGGED" = "true" ]; then
              echo "| Release tag | \`${PROJECT}-v${VERSION}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
