name: Deploy

# Trigger workflow for the "desktop" project. Maps branches/manual runs to
# environments and delegates the build + publish (and the version gate) to the
# reusable build-deploy.yml.
#
# Release policy: EVERY deploy must raise version.txt above the version currently
# deployed to that environment (tracked per env). Otherwise:
#   - automatic deploys (push)            -> skip cleanly (job stays green)
#   - manual deploys (workflow_dispatch)  -> fail loudly
#
# Monorepo note: this is one project's deploy workflow. Its project name (the
# release-tag prefix, e.g. desktop-v1.0.0) is passed as `project: desktop` on
# every call below. A new project gets its own copy of this file.
#
#   push develop  -> development  (deploys iff version.txt > development's version)
#   push main     -> staging AND production (each deploys iff version.txt > its own version)
#   manual        -> chosen env  (FAILS if version.txt is not greater for that env)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        options:
          - development
          - staging
          - production

# Default token permission for jobs in this workflow. The deploy jobs below
# elevate to `contents: write` individually; a reusable workflow can only
# request up to what its calling job grants.
permissions:
  contents: read

# Serialize runs of this trigger workflow per ref.
concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Automatic: develop -> development -------------------------------------
  development:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: development
      project: desktop
      on_no_bump: skip

  # --- Automatic: main -> staging --------------------------------------------
  staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: staging
      project: desktop
      on_no_bump: skip

  # --- Automatic: main -> production -----------------------------------------
  # No separate version-change detection needed: the reusable workflow's version
  # gate deploys only when version.txt exceeds production's deployed version, and
  # skips cleanly otherwise.
  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: production
      project: desktop
      create_tag: true
      on_no_bump: skip

  # --- Manual: deploy the selected branch to the chosen environment ----------
  # Publishes to the chosen environment's folder (development | staging |
  # production) regardless of which branch was selected — no feature paths.
  # Fails if version.txt isn't greater than that env's deployed version.
  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      project: desktop
      ref: ${{ github.ref }}
      create_tag: ${{ inputs.environment == 'production' }}
      on_no_bump: fail
