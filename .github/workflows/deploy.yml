name: Deploy

# Trigger workflow for the "desktop" project. Maps branches/manual runs to
# environments and delegates the build + publish to the reusable build-deploy.yml.
#
# Monorepo note: this is one project's deploy workflow. Its project name (used as
# the release-tag prefix, e.g. desktop-v1.0.0) is passed to build-deploy.yml as
# `project: desktop` on every call below. A new project gets its own copy of this
# file with a different project name.
#
#   push develop                  -> development  (/development/)
#   push main                     -> staging      (/staging/)
#   push main + version.txt bump  -> production   (/production/) + tag desktop-v<version>
#   manual (workflow_dispatch)    -> deploy any branch to the chosen environment
#                                    (publishes to that env's folder; no feature paths)
on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        options:
          - development
          - staging
          - production

# Default token permission for jobs in this workflow. The deploy jobs below
# elevate to `contents: write` individually; a reusable workflow can only
# request up to what its calling job grants.
permissions:
  contents: read

# Serialize runs of this trigger workflow per ref.
concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Automatic: develop -> development -------------------------------------
  development:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: development
      project: desktop

  # --- Automatic: main -> staging --------------------------------------------
  staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: staging
      project: desktop

  # --- Detect a version.txt change on main to gate production ----------------
  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff against
      - id: diff
        run: |
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            # Initial commit (no parent) — treat as the first release.
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -qx 'version.txt'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # --- Automatic: main + version bump -> production --------------------------
  production:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: production
      project: desktop
      create_tag: true

  # --- Manual: deploy the selected branch to the chosen environment ----------
  # Publishes to the chosen environment's folder (development | staging |
  # production) regardless of which branch was selected — no feature paths.
  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: ./.github/workflows/build-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      project: desktop
      ref: ${{ github.ref }}
      create_tag: ${{ inputs.environment == 'production' }}
